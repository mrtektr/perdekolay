<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teşekkürler — Perdekolay</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito Sans',sans-serif;background:#f8f7f4;color:#3d3530;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:#fff;border:1px solid #e0dbd4;border-radius:12px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(30,26,22,.08);}
    .icon{font-size:3.5rem;margin-bottom:1.2rem;}
    h1{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:500;color:#1e1a16;margin-bottom:.8rem;}
    p{font-size:.95rem;color:#6b5f54;line-height:1.8;margin-bottom:1.5rem;}
    .btn{display:inline-block;background:#b8965a;color:#fff;padding:.85rem 2rem;border-radius:6px;text-decoration:none;font-weight:700;font-size:.88rem;letter-spacing:.04em;transition:background .2s;}
    .btn:hover{background:#8a6e3e;}
    .logo{font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#b8965a;margin-bottom:2rem;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PERDEKOLAY</div>
    <div class="icon">✅</div>
    <h1>Teşekkürler!</h1>
    <p>Talebinizi aldık. En kısa sürede WhatsApp veya telefon ile size ulaşacağız.</p>
    <p style="font-size:.82rem;color:#9e9080;">Kadıköy · 0507 885 94 55</p>
    <br>
    <a href="https://www.perdekolay.com" class="btn">← Ana Sayfaya Dön</a>
  </div>
</body>
</html>
