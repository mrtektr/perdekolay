<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp ile Yazın — Perdekolay</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5R2QDMR1BJ"></script>
  <script>
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());gtag('config','G-5R2QDMR1BJ');
    gtag('event','conversion',{event_category:'whatsapp',event_label:'mesaj_sayfasi'});
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Jost',sans-serif;background:#f5f0e8;color:#2c2620;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
    .card{background:#fff;border:1px solid rgba(184,150,90,.2);padding:2.5rem 2rem;max-width:520px;width:100%;box-shadow:0 4px 24px rgba(44,38,32,.08);}
    .logo{font-size:.78rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#b8965a;margin-bottom:2rem;display:block;text-decoration:none;}
    .icon{font-size:2.5rem;margin-bottom:.8rem;}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:#2c2620;margin-bottom:.4rem;}
    .sub{font-size:.88rem;color:#9e9080;margin-bottom:1.8rem;line-height:1.7;}
    .msg-box{background:#f5f0e8;border:1px solid rgba(184,150,90,.2);padding:1.2rem;margin-bottom:.8rem;}
    .msg-label{font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#9e9080;margin-bottom:.5rem;display:block;}
    .msg-text{font-size:.9rem;color:#2c2620;line-height:1.7;white-space:pre-wrap;}
    .msg-edit{width:100%;background:#fff;border:1px solid rgba(184,150,90,.3);color:#2c2620;padding:.8rem;font-family:'Jost',sans-serif;font-size:.9rem;resize:vertical;min-height:100px;outline:none;display:none;transition:border-color .2s;}
    .msg-edit:focus{border-color:#b8965a;}
    .btn-edit{width:100%;padding:.6rem;background:transparent;border:1px solid rgba(184,150,90,.25);color:#9e9080;font-family:'Jost',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s;margin-bottom:1.5rem;}
    .btn-edit:hover{border-color:#b8965a;color:#b8965a;}
    .btn-wa{display:flex;align-items:center;justify-content:center;gap:.8rem;width:100%;padding:1rem;background:#25d366;color:#fff;border:none;font-family:'Jost',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background .2s;margin-bottom:1rem;}
    .btn-wa:hover{background:#128c4e;}
    .back{display:block;text-align:center;font-size:.75rem;color:#9e9080;text-decoration:none;letter-spacing:.06em;}
    .back:hover{color:#b8965a;}
    .tel{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid rgba(184,150,90,.12);font-size:.8rem;color:#9e9080;}
    .tel a{color:#b8965a;text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">PERDEKOLAY</a>
    <div class="icon">💬</div>
    <h1>WhatsApp'a Yaz</h1>
    <p class="sub">Mesajınızı inceleyip düzenleyebilirsiniz.<br>Hazır olduğunuzda gönder butonuna tıklayın.</p>

    <div class="msg-box">
      <span class="msg-label">Mesajınız</span>
      <div class="msg-text" id="msg-preview">Yükleniyor...</div>
      <textarea class="msg-edit" id="msg-edit"></textarea>
    </div>
    <button class="btn-edit" id="btn-edit" onclick="toggleEdit()">✏️ Mesajı Düzenle</button>

    <button class="btn-wa" onclick="sendWA()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp'ta Gönder
    </button>

    <a href="/" class="back">← Ana Sayfaya Dön</a>
    <div class="tel"><span>veya arayın:</span><a href="tel:05078859455">0507 885 94 55</a></div>
  </div>

  <script>
    var waNum = sessionStorage.getItem('wa_num') || '905078859455';
    var waMsg = sessionStorage.getItem('wa_msg') || 'Merhaba, perde hakkında bilgi almak istiyorum.';
    var editing = false;
    document.getElementById('msg-preview').textContent = waMsg;
    document.getElementById('msg-edit').value = waMsg;

    function toggleEdit(){
      editing = !editing;
      var p=document.getElementById('msg-preview');
      var e=document.getElementById('msg-edit');
      var b=document.getElementById('btn-edit');
      if(editing){
        p.style.display='none'; e.style.display='block'; e.focus();
        b.textContent='✓ Düzenlemeyi Bitir';
      } else {
        waMsg=e.value; p.textContent=waMsg;
        p.style.display='block'; e.style.display='none';
        b.textContent='✏️ Mesajı Düzenle';
      }
    }

    function sendWA(){
      if(editing){ waMsg=document.getElementById('msg-edit').value; }
      window.location.href='https://wa.me/'+waNum+'?text='+encodeURIComponent(waMsg);
    }
  </script>
</body>
</html>
