// ==================== ANA APP ====================
function App(){
  const [session,  setSession]  = React.useState(null);
  const [kontrol,  setKontrol]  = React.useState(true);

  React.useEffect(()=>{
    if(!isConfigured()){ setKontrol(false); return; }
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setKontrol(false); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  if(!isConfigured()) return <SetupGuide/>;
  if(kontrol) return <Yukleniyor msg="Bağlanıyor..."/>;
  if(!session) return <LoginPage/>;
  return <CRM session={session}/>;
}

// ==================== CRM (oturum acilinca) ====================
function CRM({session}){
  const userId = session.user.id;
  const userEmail = session.user.email;

  const [musteriler, setMusteriler] = React.useState([]);
  const [isler,      setIsler]      = React.useState([]);
  const [yukleniyor, setYukleniyor] = React.useState(true);

  const [sayfa,   setSayfa]   = React.useState("liste");
  const [secili,  setSecili]  = React.useState(null);
  const [form,    setForm]    = React.useState(BOS_IS);
  const [duzenle, setDuzenle] = React.useState(false);
  const [ara,     setAra]     = React.useState("");
  const [filtre,  setFiltre]  = React.useState("Tumu");
  const [bildi,   setBildi]   = React.useState(null);
  const [musteriModal, setMusteriModal] = React.useState(false);
  const [musteriAra,   setMusteriAra]   = React.useState("");

  const bildir = (msg,tip="ok") => { setBildi({msg,tip}); setTimeout(()=>setBildi(null),3000); };
  const listeye = () => { setSayfa("liste"); setDuzenle(false); setForm(BOS_IS); setSecili(null); };

  // Veri yukle
  const yukle = async () => {
    setYukleniyor(true);
    const [mRes, iRes] = await Promise.all([
      sb.from("musteriler").select("*").order("created_at",{ascending:false}),
      sb.from("isler").select("*").order("created_at",{ascending:false}),
    ]);
    if(!mRes.error) setMusteriler(mRes.data.map(musteriFromDb));
    if(!iRes.error) setIsler(iRes.data.map(isFromDb));
    setYukleniyor(false);
  };

  React.useEffect(()=>{ yukle(); },[]);

  // Yeni is ac
  const yeniIsAc = (musteri=null) => {
    const f = musteri?{...BOS_IS,ad:musteri.ad,soyad:musteri.soyad,tel:musteri.tel,email:musteri.email,web:musteri.web,musteriId:musteri.id}:{...BOS_IS};
    setForm(f); setDuzenle(false); setSecili(null); setSayfa("form"); setMusteriModal(false);
  };

  // Form kaydet
  const formKaydet = async () => {
    if(!form.ad||!form.tel){ bildir("Ad ve telefon zorunlu!","err"); return; }
    setYukleniyor(true);

    let musteriId = form.musteriId;

    if(musteriId){
      // Var olan musteri - guncelle
      await sb.from("musteriler").update(musteriToDb(form,userId)).eq("id",musteriId);
    } else {
      // Yeni musteri ekle
      const {data,error} = await sb.from("musteriler").insert(musteriToDb(form,userId)).select().single();
      if(error){ bildir("Musteri kaydedilemedi: "+error.message,"err"); setYukleniyor(false); return; }
      musteriId = data.id;
    }

    if(duzenle && secili){
      const {error} = await sb.from("isler").update(isToDb({...form,musteriId},userId)).eq("id",secili.id);
      if(error){ bildir("Guncelleme hatasi: "+error.message,"err"); setYukleniyor(false); return; }
      bildir("Is guncellendi ✓");
    } else {
      const {error} = await sb.from("isler").insert(isToDb({...form,musteriId},userId));
      if(error){ bildir("Kayit hatasi: "+error.message,"err"); setYukleniyor(false); return; }
      bildir("Yeni is dosyasi olusturuldu ✓");
    }

    await yukle();
    listeye();
  };

  // Sil
  const sil = async id => {
    if(!window.confirm("Bu is dosyasini silmek istiyor musunuz?")) return;
    await sb.from("isler").delete().eq("id",id);
    bildir("Silindi","err");
    await yukle();
    listeye();
  };

  // Durum guncelle
  const durumGuncelle = async (id,durum) => {
    await sb.from("isler").update({durum}).eq("id",id);
    setIsler(prev=>prev.map(is=>is.id===id?{...is,durum}:is));
    if(secili&&secili.id===id) setSecili(s=>({...s,durum}));
    bildir("Durum guncellendi ✓");
  };

  // Odeme guncelle
  const odemeGuncelle = async (id,alan,deger) => {
    const dbAlan = {
      kaporaOdendi:"kapora_odendi", kaporaYontemi:"kapora_yontemi",
      kalanOdendi:"kalan_odendi",   kalanYontemi:"kalan_yontemi",
    }[alan]||alan;
    await sb.from("isler").update({[dbAlan]:deger}).eq("id",id);
    setIsler(prev=>prev.map(is=>is.id===id?{...is,[alan]:deger}:is));
    if(secili&&secili.id===id) setSecili(s=>({...s,[alan]:deger}));
  };

  const duzenleAc   = is => { setForm({...is}); setSecili(is); setDuzenle(true); setSayfa("form"); };
  const detayAc     = is => { setSecili(is); setSayfa("detay"); };
  const musteriIsler= mid => isler.filter(is=>is.musteriId===mid);

  const filtreli = isler.filter(is=>{
    const s=ara.toLowerCase();
    return (is.ad+" "+is.soyad+" "+is.tel+" "+(is.email||"")+" "+(is.urun||"")).toLowerCase().includes(s)
      &&(filtre==="Tumu"||is.durum===filtre);
  });

  const istat={
    toplam:isler.length,
    bekliyor:isler.filter(i=>i.durum==="Bekliyor").length,
    devam:isler.filter(i=>i.durum==="Devam Ediyor").length,
    atolye:isler.filter(i=>i.durum==="Atolyeye Teslim").length,

      if(is.kaporaOdendi) tahsil+=kap; else bekleyen+=kap;
      if(is.kalanOdendi) tahsil+=kal; else bekleyen+=kal;
    });
    return {tahsil,bekleyen};
  };

                    <div>

                    <div style={{textAlign:"right"}}>

                    </div>

            <button onClick={()=>yeniIsAc()} style={{marginTop:12,background:"#f0f4f8",border:"none",borderRadius:7,padding:"9px",cursor:"pointer",fontWeight:600,fontSize:12,color:"#555"}}>

            </button>
          </div>
        </div>

      <div style={{background:"linear-gradient(135deg,#1a1a2e,#0f3460)",padding:"0 16px",boxShadow:"0 2px 16px rgba(0,0,0,.3)"}}>

          <div style={{display:"flex",alignItems:"center",gap:10}}>

            <div style={{display:"flex",gap:3,marginLeft:8}}>

                <button key={id} onClick={()=>setSayfa(id)} style={{padding:"3px 10px",borderRadius:5,border:"1px solid rgba(255,255,255,.15)",cursor:"pointer",fontSize:10,fontWeight:600,background:sayfa===id?"rgba(255,255,255,.22)":"rgba(255,255,255,.07)",color:"#fff"}}>{lab}</button>

          </div>
          <div style={{display:"flex",gap:6}}>

            {(sayfa==="liste"||sayfa==="yaklasan"||sayfa==="takvim"||sayfa==="musteriler")&&(

          </div>

        {/* ─── İS LİSTESİ ─── */}

            {(()=>{const oz=odemeOzet();return(

                <div style={{fontSize:11,fontWeight:800,color:"#e94560"}}>{oz.tahsil.toLocaleString("tr-TR")} TL</div>
                <div style={{fontSize:9,color:"#888",marginTop:1}}>Tahsil edildi</div>
                <div style={{fontSize:10,color:"#DC3545",marginTop:2,fontWeight:600}}>{oz.bekleyen.toLocaleString("tr-TR")} TL bekliyor</div>

          {/* Filtre */}

          {filtreli.length===0

            :<div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",overflow:"hidden"}}>

                       const top=parseFloat(is.toplamTutar)||0;
                       const kap=parseFloat(is.kaporaTutar)||0;
                       const kalan=top-kap;
                       const tahsil=(is.kaporaOdendi?kap:0)+(is.kalanOdendi?kalan:0);
                       return <tr key={is.id} style={{borderBottom:"1px solid #f0f0f0",background:i%2===0?"#fff":"#fafbfc",cursor:"pointer"}} onClick={()=>detayAc(is)}>

                         <td style={{padding:"9px 11px",whiteSpace:"nowrap"}}>{is.tel}</td>
                         <td style={{padding:"9px 11px",maxWidth:120}}><div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{is.urun||"-"}</div></td>
                         <td style={{padding:"9px 11px",whiteSpace:"nowrap",color:"#555",fontSize:10}}>{tarih(is.randevuT,is.randevuS)}</td>
                         <td style={{padding:"9px 11px",whiteSpace:"nowrap",color:"#555",fontSize:10}}>{tarih(is.teslimT,is.teslimS)}</td>
                         <td style={{padding:"9px 11px",whiteSpace:"nowrap"}} onClick={e=>e.stopPropagation()}>
                           {top>0?(
                             <div>
                               <div style={{fontSize:10,fontWeight:700,color:"#28A745"}}>{tahsil.toLocaleString("tr-TR")} TL</div>
                               {top-tahsil>0&&<div style={{fontSize:9,color:"#DC3545"}}>Kalan: {(top-tahsil).toLocaleString("tr-TR")} TL</div>}
                             </div>
                           ):<span style={{fontSize:9,color:"#aaa"}}>-</span>}
                         </td>
                         <td style={{padding:"9px 11px"}} onClick={e=>e.stopPropagation()}>
                           <select value={is.durum} onChange={e=>durumGuncelle(is.id,e.target.value)} style={{background:s.bg,color:s.tx,border:"1px solid "+s.dot,borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700,cursor:"pointer",outline:"none"}}>
                             {Object.keys(SC).map(d=><option key={d}>{d}</option>)}
                           </select>
                         </td>
                         <td style={{padding:"9px 8px",whiteSpace:"nowrap"}} onClick={e=>e.stopPropagation()}>
                           <button onClick={()=>duzenleAc(is)} style={{background:"#f0f4f8",border:"none",borderRadius:5,padding:"4px 7px",cursor:"pointer",marginRight:3,fontSize:11}}>✏️</button>
                           <button onClick={()=>whatsappAnket(is)} title="WhatsApp Anket Gonder" style={{background:"#25D366",border:"none",borderRadius:5,padding:"4px 7px",cursor:"pointer",marginRight:3,fontSize:11,color:"#fff",fontWeight:700}}>📲</button>
                           <button onClick={()=>sil(is.id)} style={{background:"#fdf0f2",border:"none",borderRadius:5,padding:"4px 7px",cursor:"pointer",fontSize:11}}>🗑️</button>
                         </td>
                       </tr>;
                     })}
                   </tbody>
                 </table>
               </div>
             </div>}
        </>}

        {/* ─── MÜŞTERİLER ─── */}
        {sayfa==="musteriler"&&<>
          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",overflow:"hidden"}}>

            {musteriler.length===0
              ?<div style={{padding:"40px 20px",textAlign:"center",color:"#aaa"}}><div style={{fontSize:36}}>👥</div><div style={{marginTop:8,fontSize:12}}>Henuz musteri yok</div></div>
              :musteriler.map((m,i)=>{
                const isler = musteriIsler(m.id);
                const sonIs = isler[0];
                return(
                  <div key={m.id} style={{padding:"12px 16px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center",background:i%2===0?"#fff":"#fafbfc"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{m.ad} {m.soyad}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>{m.tel} {m.email&&"· "+m.email}</div>
                      {sonIs&&<div style={{fontSize:10,color:"#aaa",marginTop:2}}>Son is: {sonIs.urun||"belirtilmemis"} — <Rozet d={sonIs.durum}/></div>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#888"}}>{isler.length} is dosyasi</span>
                      <button onClick={()=>yeniIsAc(m)} style={{background:"#0f3460",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:700,color:"#fff",fontSize:11}}>+ Yeni Is</button>
                    </div>
                  </div>

        {sayfa==="form"&&(

            <h2 style={{margin:"0 0 4px",fontSize:16,fontWeight:800}}>{duzenle?"Is Dosyasini Duzenle":"Yeni Is Dosyasi"}</h2>
            {form.musteriId&&<div style={{fontSize:11,color:"#9B59B6",fontWeight:600,marginBottom:16}}>Mevcut musteri icin yeni is dosyasi</div>}
            {!form.musteriId&&<div style={{fontSize:11,color:"#888",marginBottom:16}}>Yeni musteri kaydedilecek</div>}

            <Bolum baslik="Musteri Bilgileri">
              <G2><Alan lbl="Ad *" val={form.ad} set={v=>setForm({...form,ad:v})} ph="Ahmet"/><Alan lbl="Soyad" val={form.soyad} set={v=>setForm({...form,soyad:v})} ph="Yilmaz"/></G2>

              <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,cursor:"pointer",color:"#555"}}>

// ==================== YAKLAŞAN ====================
function Yaklasan({isler, onSec}){
  const [aralik, setAralik] = React.useState("7");
  const [tip,    setTip]    = React.useState("tumu");

  const bugunObj = new Date(); bugunObj.setHours(0,0,0,0);
  const bugunStr = bugunObj.toISOString().split("T")[0];
  const ekle = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };

  const etk = [];
  isler.forEach(is=>{
    if(is.randevuT) etk.push({tarih:is.randevuT,saat:is.randevuS||"",tip:"randevu",is});
    if(is.teslimT)  etk.push({tarih:is.teslimT, saat:is.teslimS||"",tip:"teslim", is});
  });

  const son = aralik==="tumu"?null:ekle(bugunObj,parseInt(aralik));
  const filtered = etk.filter(e=>{
    if(e.tarih<bugunStr) return false;
    if(son){ const d=new Date(e.tarih); d.setHours(0,0,0,0); if(d>son) return false; }
    if(tip!=="tumu"&&e.tip!==tip) return false;
    return true;
  }).sort((a,b)=>(a.tarih+a.saat).localeCompare(b.tarih+b.saat));

  const gruplar={};
  filtered.forEach(e=>{ if(!gruplar[e.tarih]) gruplar[e.tarih]=[]; gruplar[e.tarih].push(e); });
  const anahtarlar=Object.keys(gruplar).sort();

  const gunBilgi = ts => {
    const d=new Date(ts); d.setHours(0,0,0,0);
    const fark=Math.round((d-bugunObj)/86400000);
    const base=ts.split("-").reverse().join(".");
    if(fark===0) return {base,etiket:"Bugun",renk:"#DC3545"};
    if(fark===1) return {base,etiket:"Yarin",renk:"#f07020"};
    if(fark<=7)  return {base,etiket:WGUN[d.getDay()],renk:"#17A2B8"};
    return {base,etiket:WGUN[d.getDay()],renk:"#888"};
  };

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[
          {l:"Bugun",v:filtered.filter(e=>e.tarih===bugunStr).length,c:"#DC3545"},
          {l:"Bu Hafta",v:filtered.filter(e=>{const d=new Date(e.tarih);d.setHours(0,0,0,0);return d<=ekle(bugunObj,7)}).length,c:"#FFC107"},
          {l:"Randevu",v:filtered.filter(e=>e.tip==="randevu").length,c:"#17A2B8"},
          {l:"Teslim",v:filtered.filter(e=>e.tip==="teslim").length,c:"#28A745"},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",borderRadius:10,padding:11,boxShadow:"0 2px 8px rgba(0,0,0,.06)",borderLeft:"4px solid "+s.c}}>
            <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:"#666",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:9,padding:"8px 12px",marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        {[["3","3G"],["7","7G"],["14","14G"],["30","30G"],["tumu","Tumu"]].map(([v,l])=>(
          <button key={v} onClick={()=>setAralik(v)} style={{padding:"3px 9px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:aralik===v?"#0f3460":"#f0f4f8",color:aralik===v?"#fff":"#555"}}>{l}</button>
        ))}
        <span style={{marginLeft:"auto"}}></span>
        {[["tumu","Tumu"],["randevu","Randevu"],["teslim","Teslim"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTip(v)} style={{padding:"3px 9px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:tip===v?"#0f3460":"#f0f4f8",color:tip===v?"#fff":"#555"}}>{l}</button>
        ))}
      </div>
      {anahtarlar.length===0
        ?<div style={{background:"#fff",borderRadius:10,padding:"36px 20px",textAlign:"center"}}><div style={{fontSize:36}}>📭</div><div style={{marginTop:8,fontSize:13,color:"#666"}}>Yaklasan etkinlik yok</div></div>
        :anahtarlar.map(ts=>{
          const {base,etiket,renk}=gunBilgi(ts);
          const bm=ts===bugunStr;
          return(
            <div key={ts} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                <div style={{background:bm?"#0f3460":"#f0f4f8",color:bm?"#fff":"#555",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:800}}>{base}</div>
                <span style={{background:renk,color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>{etiket}</span>
                <div style={{flex:1,height:1,background:"#e8edf2"}}></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
                {gruplar[ts].map((e,i)=>{
                  const is=e.is;
                  const isR=e.tip==="randevu";
                  const ac=isR?"#17A2B8":"#28A745";
                  return(
                    <div key={i} onClick={()=>onSec(is)} style={{background:"#fff",borderRadius:9,padding:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)",cursor:"pointer",borderLeft:"4px solid "+ac}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                        <div><div style={{fontWeight:800,fontSize:13}}>{is.ad} {is.soyad}</div><div style={{fontSize:11,color:"#999"}}>{is.tel}</div></div>
                        <div style={{textAlign:"right"}}>
                          <span style={{background:isR?"#e8f7fb":"#e8f5ec",color:ac,borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:700}}>{isR?"Randevu":"Teslim"}</span>
                          {e.saat&&<div style={{fontSize:12,fontWeight:800,color:ac,marginTop:2}}>🕐 {e.saat}</div>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                        {is.urun&&<span style={{fontSize:10,background:"#f0f4f8",color:"#555",padding:"2px 6px",borderRadius:4,fontWeight:600}}>{is.urun}</span>}
                        <Rozet d={is.durum}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
    </div>
  );
}

// ==================== TAKVİM ====================
function Takvim({isler, onSec}){
  const bugun=new Date();
  const [yil,  setYil]  = React.useState(bugun.getFullYear());
  const [ay,   setAy]   = React.useState(bugun.getMonth());
  const [mod,  setMod]  = React.useState("ay");
  const [hOfs, setHOfs] = React.useState(0);

  const oncekiAy=()=>{ if(ay===0){setAy(11);setYil(y=>y-1)}else setAy(a=>a-1) };
  const sonrakiAy=()=>{ if(ay===11){setAy(0);setYil(y=>y+1)}else setAy(a=>a+1) };
  const bStr=`${bugun.getFullYear()}-${String(bugun.getMonth()+1).padStart(2,"0")}-${String(bugun.getDate()).padStart(2,"0")}`;

  const etk=[];
  isler.forEach(is=>{
    if(is.randevuT) etk.push({tarih:is.randevuT,etiket:is.ad+" "+is.soyad,saat:is.randevuS||"",tip:"randevu",renk:"#17A2B8",is});
    if(is.teslimT)  etk.push({tarih:is.teslimT, etiket:is.ad+" "+is.soyad,saat:is.teslimS||"",tip:"teslim", renk:"#28A745",is});
  });
  const icin=d=>etk.filter(e=>e.tarih===d);

  let ilkGun=new Date(yil,ay,1).getDay(); ilkGun=ilkGun===0?6:ilkGun-1;
  const gs=new Date(yil,ay+1,0).getDate();
  const huc=[]; for(let i=0;i<ilkGun;i++) huc.push(null); for(let d=1;d<=gs;d++) huc.push(d);
  while(huc.length%7!==0) huc.push(null);
  const hS=d=>d?`${yil}-${String(ay+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`:null;

  const haftaGetir=ofs=>{
    const b=new Date(bugun); b.setDate(b.getDate()-b.getDay()+1+ofs*7);
    return Array.from({length:7},(_,i)=>{ const d=new Date(b); d.setDate(b.getDate()+i);
      return {t:d,str:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
    });
  };
  const hafta=haftaGetir(hOfs);

  return(
    <div>
      <div style={{background:"#fff",borderRadius:10,padding:"10px 14px",marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:7}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {mod==="ay"
            ?<><button onClick={oncekiAy} style={{background:"#f0f4f8",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontWeight:700,fontSize:13}}>&#8249;</button>
              <span style={{fontSize:14,fontWeight:800,minWidth:120,textAlign:"center"}}>{AY[ay]} {yil}</span>
              <button onClick={sonrakiAy} style={{background:"#f0f4f8",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontWeight:700,fontSize:13}}>&#8250;</button>
              <button onClick={()=>{setYil(bugun.getFullYear());setAy(bugun.getMonth())}} style={{background:"#e8f4fd",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:10,fontWeight:600,color:"#0f3460"}}>Bugun</button>
            </>
            :<><button onClick={()=>setHOfs(h=>h-1)} style={{background:"#f0f4f8",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontWeight:700,fontSize:13}}>&#8249;</button>
              <span style={{fontSize:12,fontWeight:800,minWidth:160,textAlign:"center"}}>{hafta[0].t.toLocaleDateString("tr-TR",{day:"numeric",month:"short"})} - {hafta[6].t.toLocaleDateString("tr-TR",{day:"numeric",month:"short"})}</span>
              <button onClick={()=>setHOfs(h=>h+1)} style={{background:"#f0f4f8",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontWeight:700,fontSize:13}}>&#8250;</button>
              <button onClick={()=>setHOfs(0)} style={{background:"#e8f4fd",border:"none",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:10,fontWeight:600,color:"#0f3460"}}>Bu Hafta</button>
            </>
          }
        </div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>setMod("ay")} style={{padding:"3px 9px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:mod==="ay"?"#0f3460":"#f0f4f8",color:mod==="ay"?"#fff":"#555"}}>Aylik</button>
          <button onClick={()=>setMod("hafta")} style={{padding:"3px 9px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:mod==="hafta"?"#0f3460":"#f0f4f8",color:mod==="hafta"?"#fff":"#555"}}>Haftalik</button>
        </div>
      </div>

      {mod==="ay"&&<div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f8fafc",borderBottom:"2px solid #e8edf2"}}>
          {GUN.map(g=><div key={g} style={{padding:"7px 0",textAlign:"center",fontSize:9,fontWeight:700,color:"#666"}}>{g}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {huc.map((d,i)=>{
            const ds=hS(d); const e2=d?icin(ds):[]; const bm=ds===bStr; const hs=(i%7)>=5;
            return<div key={i} style={{minHeight:65,padding:3,borderRight:"1px solid #f0f0f0",borderBottom:"1px solid #f0f0f0",background:d?(bm?"#eff6ff":"#fff"):"#fafafa"}}>
              {d&&<div style={{width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:bm?800:400,fontSize:9,background:bm?"#0f3460":"transparent",color:bm?"#fff":hs?"#e94560":"#333",marginBottom:2}}>{d}</div>}
              {e2.slice(0,2).map((e,ei)=><div key={ei} onClick={ev=>{ev.stopPropagation();onSec(e.is)}} style={{background:e.renk,color:"#fff",borderRadius:2,padding:"1px 3px",fontSize:8,fontWeight:600,marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",cursor:"pointer"}}>{e.etiket}</div>)}
              {e2.length>2&&<div style={{fontSize:7,color:"#888",fontWeight:600}}>+{e2.length-2}</div>}
            </div>;
          })}
        </div>
      </div>}

      {mod==="hafta"&&<div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.06)",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f8fafc",borderBottom:"2px solid #e8edf2"}}>
          {hafta.map(({t,str})=>{const bm=str===bStr;return(
            <div key={str} style={{padding:"8px 4px",textAlign:"center",borderRight:"1px solid #f0f0f0"}}>
              <div style={{fontSize:8,color:"#999",marginBottom:2}}>{GUN[t.getDay()===0?6:t.getDay()-1]}</div>
              <div style={{width:23,height:23,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",background:bm?"#0f3460":"transparent",color:bm?"#fff":"#333",fontWeight:bm?800:500,fontSize:11}}>{t.getDate()}</div>
            </div>
          );})}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",minHeight:120}}>
          {hafta.map(({str})=>{const e2=icin(str);const bm=str===bStr;return(
            <div key={str} style={{padding:5,borderRight:"1px solid #f0f0f0",background:bm?"#eff6ff":"#fff",minHeight:110}}>
              {e2.length===0&&<div style={{color:"#ddd",fontSize:8,textAlign:"center",marginTop:14}}>-</div>}
              {e2.map((e,ei)=><div key={ei} onClick={()=>onSec(e.is)} style={{background:e.renk,color:"#fff",borderRadius:4,padding:"3px 4px",fontSize:8,fontWeight:600,marginBottom:3,cursor:"pointer"}}>
                <div>{e.etiket}</div>
                {e.saat&&<div style={{opacity:.85}}>{e.saat}</div>}
              </div>)}
            </div>
          );})}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
